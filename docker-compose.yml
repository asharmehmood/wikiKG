# docker-compose.yml stub — fully implemented in T-28
# Services: backend (8000), qdrant (6333), ollama (optional 11434)

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    # TODO T-28: add volumes, healthcheck, extra_hosts for Linux ollama

  qdrant:
    image: qdrant/qdrant:v1.13.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ollama:           # Uncomment for clean-room mode (DESIGN.md §7)
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
