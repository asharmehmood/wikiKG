# docker-compose.yml
# Services: backend (8000), qdrant (6333), ollama (optional — enable with --profile gpu)
#
# Linux users: Ollama runs on the host. The `extra_hosts` entry maps host-gateway so
# the backend container can reach http://host.docker.internal:11434.
# Docker Desktop on macOS/Windows resolves host.docker.internal automatically.

services:

  # ── Backend (FastAPI + built frontend) ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "9000:8000"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      QDRANT_HOST: qdrant
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      GEN_MODEL: ${GEN_MODEL:-llama3:8b}
      EMBED_MODEL: ${EMBED_MODEL:-mxbai-embed-large}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST_PORT: ${HOST_PORT:-9000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── Qdrant vector store ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Ollama (optional — activate with: docker compose --profile gpu up) ─────
  ollama:
    image: ollama/ollama:latest
    profiles:
      - gpu
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':>/dev/tcp/127.0.0.1/11434'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_data:
