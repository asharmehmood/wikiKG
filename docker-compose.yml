  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 20s

